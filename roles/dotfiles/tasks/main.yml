# Install latest Neovim AppImage (Linux only)
- name: Ensure ~/.local/bin directory exists
  file:
    path: "{{ user_home }}/.local/bin"
    state: directory
    mode: '0755'

- name: Download latest Neovim AppImage
  get_url:
    url: >-
      https://github.com/neovim/neovim/releases/latest/download/nvim-linux-{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64' }}.appimage
    dest: "{{ user_home }}/.local/bin/nvim.appimage"
    mode: '0755'
  when: ansible_facts['system'] == 'Linux'

- name: Symlink nvim.appimage to nvim in PATH
  file:
    src: "{{ user_home }}/.local/bin/nvim.appimage"
    dest: "{{ user_home }}/.local/bin/nvim"
    state: link
    force: true
  when: ansible_facts['system'] == 'Linux'

- name: Ensure zsh is installed (Debian/Ubuntu)
  apt:
    name: zsh
    state: present
  when: ansible_facts['os_family'] == 'Debian'

- name: Set zsh as default shell for user (Debian/Ubuntu)
  user:
    name: "{{ ansible_user_id }}"
    shell: /usr/bin/zsh
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['user_shell'] != '/usr/bin/zsh'
  become: true

- name: Ensure Homebrew is installed (macOS)
  homebrew:
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Ensure /opt/homebrew/bin is in PATH in .zshrc (macOS)
  lineinfile:
    path: "{{ user_home }}/.zshrc"
    regexp: '(^|\n)\s*export\s+PATH=.*\/opt\/homebrew\/bin.*:\$PATH'
    line: 'export PATH=/opt/homebrew/bin:$PATH'
    insertafter: BOF
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install required packages (macOS)
  homebrew:
    name:
      - git
      - tmux
      - pyenv
      - neovim
      - fzf
      - curl
      - gpg
      - bitwarden-cli
      - gh
      - gitleaks
      - mise
      - tree-sitter-cli
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install required packages (Debian/Ubuntu)
  apt:
    name:
      - git
      - tmux
      - curl
      - gpg
      - python3-pip
      - python3-venv
      - unzip
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == 'Debian'
  become: true

- name: Install required packages (RedHat/CentOS)
  yum:
    name:
      - git
      - tmux
      - curl
      - gpg
      - python3-pip
      - python3-venv
      - neovim
      - fzf
      - unzip
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
  become: true

# Install the homelab internal CA root cert. The cert itself is the public
# part (no private key) and is safe to commit. NODE_EXTRA_CA_CERTS in zshrc
# points at the user-readable copy, so Node-based tools (Claude Code MCP,
# etc.) trust internal services without depending on step-ca being checked
# out on this host.
- name: Ensure ~/.local/share exists
  file:
    path: "{{ user_home }}/.local/share"
    state: directory
    mode: '0755'

- name: Install internal CA cert (user-readable, for NODE_EXTRA_CA_CERTS)
  copy:
    src: internal-ca.crt
    dest: "{{ user_home }}/.local/share/internal-ca.crt"
    mode: '0644'

- name: Install internal CA cert into system trust (Debian/Ubuntu)
  copy:
    src: internal-ca.crt
    dest: /usr/local/share/ca-certificates/internal-ca.crt
    mode: '0644'
    owner: root
    group: root
  when: ansible_facts['os_family'] == 'Debian'
  become: true
  notify: Update CA trust (Debian)

- name: Install internal CA cert into system trust (RedHat)
  copy:
    src: internal-ca.crt
    dest: /etc/pki/ca-trust/source/anchors/internal-ca.crt
    mode: '0644'
    owner: root
    group: root
  when: ansible_facts['os_family'] == 'RedHat'
  become: true
  notify: Update CA trust (RedHat)

- name: Set internal CA fingerprints (macOS)
  set_fact:
    internal_ca_fingerprint: "DC78AE4E8AED36E3CABC8C4486EE090196B0E470"
    internal_ca_retired_fingerprints:
      - "7616E9B785B40BFC1BC96ADB3C753E9896E3153B"  # rotated out 2026-05-08
  when: ansible_facts['os_family'] == 'Darwin'

- name: Check whether internal CA is in macOS System keychain
  command: >
    security find-certificate -a -Z /Library/Keychains/System.keychain
  register: macos_keychain_dump
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'Darwin'

# macOS 11+ will prompt for admin auth (GUI) on the add/delete. Unavoidable
# from CLI; silent install requires an MDM configuration profile.
- name: Add internal CA to macOS System keychain as trusted root
  command: >
    security add-trusted-cert -d -r trustRoot
    -k /Library/Keychains/System.keychain
    {{ user_home }}/.local/share/internal-ca.crt
  become: true
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - internal_ca_fingerprint not in macos_keychain_dump.stdout | default('')

- name: Remove retired internal CA fingerprints from macOS System keychain
  command: >
    security delete-certificate -Z {{ item }}
    /Library/Keychains/System.keychain
  become: true
  loop: "{{ internal_ca_retired_fingerprints | default([]) }}"
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - item in macos_keychain_dump.stdout | default('')

- name: Ensure ~/.vim/autoload directory exists
  file:
    path: "{{ user_home }}/.vim/autoload"
    state: directory
    mode: '0755'

- name: Download vim-plug
  get_url:
    url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    dest: "{{ user_home }}/.vim/autoload/plug.vim"
    mode: '0644'

- name: Symlink .vimrc
  file:
    src: "{{ dotfiles_repo }}/vimrc"
    dest: "{{ user_home }}/.vimrc"
    state: link
    force: true

- name: Copy vim/after directory
  copy:
    src: "{{ dotfiles_repo }}/vim/after"
    dest: "{{ user_home }}/.vim/after"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0755'

- name: Ensure ~/.config directory exists
  file:
    path: "{{ user_home }}/.config"
    state: directory
    mode: '0755'

- name: Copy flake8 config
  copy:
    src: "{{ dotfiles_repo }}/flake8"
    dest: "{{ user_home }}/.config/flake8"
    mode: '0644'

- name: Ensure ~/.config/nvim exists
  file:
    path: "{{ user_home }}/.config/nvim"
    state: directory
    mode: '0755'

- name: Symlink nvim/init.vim
  file:
    src: "{{ dotfiles_repo }}/nvim/init.vim"
    dest: "{{ user_home }}/.config/nvim/init.vim"
    state: link
    force: true

- name: Symlink nvim/lua
  file:
    src: "{{ dotfiles_repo }}/nvim/lua"
    dest: "{{ user_home }}/.config/nvim/lua"
    state: link
    force: true

- name: Clone pyenv
  git:
    repo: https://github.com/pyenv/pyenv.git
    dest: "{{ user_home }}/.pyenv"
    update: yes
  when: ansible_facts['system'] == 'Linux'

- name: Clone pyenv-virtualenv
  git:
    repo: https://github.com/pyenv/pyenv-virtualenv.git
    dest: "{{ user_home }}/.pyenv/plugins/pyenv-virtualenv"
    update: yes
  when: ansible_facts['system'] == 'Linux'

- name: Clone tmux plugin manager
  git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ user_home }}/.tmux/plugins/tpm"
    update: yes

- name: Symlink tmux.conf
  file:
    src: "{{ dotfiles_repo }}/tmux.conf"
    dest: "{{ user_home }}/.tmux.conf"
    state: link
    force: true

- name: Copy cshrc
  copy:
    src: "{{ dotfiles_repo }}/cshrc"
    dest: "{{ user_home }}/.cshrc"
    mode: '0644'

- name: Copy inputrc file
  copy:
    src: "{{ dotfiles_repo }}/inputrc"
    dest: "{{ user_home }}/.inputrc"
    mode: '0644'


# Ensure ~/.shellrc exists before symlinking bashrc.d and zshrc.d
- name: Ensure ~/.shellrc directory exists
  file:
    path: "{{ user_home }}/.shellrc"
    state: directory
    mode: '0755'

- name: Symlink bashrc.d
  file:
    src: "{{ dotfiles_repo }}/bashrc.d"
    dest: "{{ user_home }}/.shellrc/bashrc.d"
    state: link
    force: true

- name: Symlink zshrc.d
  file:
    src: "{{ dotfiles_repo }}/zshrc.d"
    dest: "{{ user_home }}/.shellrc/zshrc.d"
    state: link
    force: true

- name: Symlink .zshrc
  file:
    src: "{{ dotfiles_repo }}/zshrc"
    dest: "{{ user_home }}/.zshrc"
    state: link
    force: true

- name: Symlink .zshenv
  file:
    src: "{{ dotfiles_repo }}/zshenv"
    dest: "{{ user_home }}/.zshenv"
    state: link
    force: true

- name: Symlink .gitconfig
  file:
    src: "{{ dotfiles_repo }}/gitconfig"
    dest: "{{ user_home }}/.gitconfig"
    state: link
    force: true

- name: Symlink .gitignore
  file:
    src: "{{ dotfiles_repo }}/gitignore"
    dest: "{{ user_home }}/.gitignore"
    state: link
    force: true

- name: Clone fzf
  git:
    repo: https://github.com/junegunn/fzf.git
    dest: "{{ user_home }}/.fzf"
    update: yes
  when:
    - ansible_facts['system'] == 'Linux'

- name: Install fzf key bindings and completion
  shell: |
    {{ user_home }}/.fzf/install --key-bindings --completion --no-update-rc
  args:
    chdir: "{{ user_home }}/.fzf"
    creates: "{{ user_home }}/.fzf.bash"

# nvim-treesitter's main branch builds parsers from source via the tree-sitter
# CLI. Apt's version is too old (0.22 on 25.10; main requires >=0.26.1) and
# the cargo install pulls rquickjs-sys, which fails to bindgen against libclang
# on Ubuntu 25.10. Upstream prebuilt binary is the reliable path.
- name: Install tree-sitter CLI (Linux, prebuilt binary)
  shell: |
    set -euo pipefail
    mkdir -p "{{ user_home }}/.local/bin"
    curl -fsSL https://github.com/tree-sitter/tree-sitter/releases/download/v0.26.8/tree-sitter-linux-x64.gz \
      | gunzip > "{{ user_home }}/.local/bin/tree-sitter"
    chmod +x "{{ user_home }}/.local/bin/tree-sitter"
  args:
    creates: "{{ user_home }}/.local/bin/tree-sitter"
  when: ansible_facts['system'] == 'Linux'

- name: Install Bitwarden CLI (Linux, official zip)
  shell: |
    set -euo pipefail
    mkdir -p "{{ user_home }}/.local/bin"
    tmp="$(mktemp -d)"
    curl -fsSL "https://vault.bitwarden.com/download/?app=cli&platform=linux" -o "$tmp/bw.zip"
    unzip -o "$tmp/bw.zip" -d "$tmp"
    install -m 0755 "$tmp/bw" "{{ user_home }}/.local/bin/bw"
    rm -rf "$tmp"
  args:
    creates: "{{ user_home }}/.local/bin/bw"
  when: ansible_facts['system'] == 'Linux'

- name: Install gitleaks (Linux, GitHub release)
  shell: |
    set -euo pipefail
    mkdir -p "{{ user_home }}/.local/bin"
    tmp="$(mktemp -d)"
    arch="{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x64' }}"
    sha="{{ 'e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080' if ansible_facts['architecture'] == 'aarch64' else '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb' }}"
    curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_${arch}.tar.gz" \
      -o "$tmp/gitleaks.tar.gz"
    echo "${sha}  $tmp/gitleaks.tar.gz" | sha256sum -c -
    tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp" gitleaks
    install -m 0755 "$tmp/gitleaks" "{{ user_home }}/.local/bin/gitleaks"
    rm -rf "$tmp"
  args:
    creates: "{{ user_home }}/.local/bin/gitleaks"
  when: ansible_facts['system'] == 'Linux'

# Shared apt keyring directory for third-party repos (gh, mise, ...).
- name: Ensure /etc/apt/keyrings exists (Debian)
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: ansible_facts['os_family'] == 'Debian'
  become: true

# Install gh from GitHub's official package repos so it tracks upstream
# releases — distro-packaged gh lags significantly behind.
- name: Install GitHub CLI apt keyring (Debian)
  get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'
    owner: root
    group: root
  when: ansible_facts['os_family'] == 'Debian'
  become: true

- name: Add GitHub CLI apt repository (Debian)
  apt_repository:
    repo: >-
      deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}
      signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main
    filename: github-cli
    state: present
  when: ansible_facts['os_family'] == 'Debian'
  become: true

- name: Install GitHub CLI (Debian)
  apt:
    name: gh
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == 'Debian'
  become: true

- name: Install mise apt keyring (Debian)
  get_url:
    url: https://mise.jdx.dev/gpg-key.pub
    dest: /etc/apt/keyrings/mise-archive-keyring.asc
    mode: '0644'
    owner: root
    group: root
  when: ansible_facts['os_family'] == 'Debian'
  become: true

- name: Add mise apt repository (Debian)
  apt_repository:
    repo: >-
      deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}
      signed-by=/etc/apt/keyrings/mise-archive-keyring.asc]
      https://mise.jdx.dev/deb stable main
    filename: mise
    state: present
  when: ansible_facts['os_family'] == 'Debian'
  become: true

- name: Install mise (Debian)
  apt:
    name: mise
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == 'Debian'
  become: true

- name: Add GitHub CLI yum repository (RedHat)
  yum_repository:
    name: gh-cli
    description: GitHub CLI
    baseurl: https://cli.github.com/packages/rpm
    gpgcheck: yes
    gpgkey: https://cli.github.com/packages/rpm/gpg.key
    enabled: yes
  when: ansible_facts['os_family'] == 'RedHat'
  become: true

- name: Install GitHub CLI (RedHat)
  yum:
    name: gh
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
  become: true

- name: Add mise yum repository (RedHat)
  yum_repository:
    name: mise
    description: mise
    baseurl: https://mise.jdx.dev/rpm
    gpgcheck: yes
    gpgkey: https://mise.jdx.dev/gpg-key.pub
    enabled: yes
  when: ansible_facts['os_family'] == 'RedHat'
  become: true

- name: Install mise (RedHat)
  yum:
    name: mise
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
  become: true


- name: Ensure ~/.config/mise exists
  file:
    path: "{{ user_home }}/.config/mise"
    state: directory
    mode: '0755'

- name: Symlink mise config
  file:
    src: "{{ dotfiles_repo }}/mise-config.toml"
    dest: "{{ user_home }}/.config/mise/config.toml"
    state: link
    force: true

# `mise activate` only sets up PATH/shims; it does not install missing tools.
# Install everything declared in the global config so the tools that moved off
# cargo/brew (starship, ripgrep, zoxide, aichat, ...) actually exist — notably
# starship, whose `starship init` runs unconditionally at shell startup.
- name: Install mise-managed tools
  command: mise install --yes
  environment:
    PATH: "/opt/homebrew/bin:{{ user_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  register: mise_install
  changed_when: "'Installing' in mise_install.stdout or 'Installing' in mise_install.stderr"


- name: Ensure ~/.local/bin is in PATH in .zshrc
  lineinfile:
    path: "{{ user_home }}/.zshrc"
    regexp: '(^|\n)\s*export\s+PATH=.*\.local/bin.*:\$PATH'
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    insertafter: EOF
    state: present

- name: Symlink starship.toml
  file:
    src: "{{ dotfiles_repo }}/starship.toml"
    dest: "{{ user_home }}/.config/starship.toml"
    state: link
    force: true

- name: Symlink aichat config directory (macOS)
  file:
    src: "{{ dotfiles_repo }}/aichat"
    dest: "{{ user_home }}/Library/Application Support/aichat"
    state: link
    force: true
  when: ansible_facts['os_family'] == 'Darwin'

- name: Symlink aichat config directory (Linux)
  file:
    src: "{{ dotfiles_repo }}/aichat"
    dest: "{{ user_home }}/.config/aichat"
    state: link
    force: true
  when: ansible_facts['system'] == 'Linux'

- name: Ensure starship prompt is initialized in .zshrc
  lineinfile:
    path: "{{ user_home }}/.zshrc"
    regexp: '^\s*eval\s*"\$\(\s*starship\s+init\s+zsh\s*\)"'
    line: 'eval "$(starship init zsh)"'
    insertafter: EOF
    state: present

- name: Install rvm (if not present)
  shell: |
    gpg --keyserver keyserver.ubuntu.com --recv-keys 409B6B1796C275462A1703113804BB82D39DC0E3 7D2BAF1CF37B13E2069D6956105BD0E739499BDB
    curl -sSL https://get.rvm.io | bash
  args:
    creates: "{{ user_home }}/.rvm/bin/rvm"
  when: install_rvm

- name: Ensure ~/repos/github exists
  file:
    path: "{{ user_home }}/repos/github"
    state: directory
    mode: '0755'
